<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Briana Natali</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FDF4FF 0%, #faf5ff 50%, #f3e8ff 100%);
            font-family: 'Playfair Display', serif;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
        }
        
        .loading h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #9333ea;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(147, 51, 234, 0.2);
        }
        
        .loading .nombre {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            background: linear-gradient(to bottom, #a78bfa 0%, #7c3aed 50%, #6d28d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            text-shadow: none;
        }
        
        .loading .mensaje {
            color: #7c3aed;
            font-size: 1rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3e8ff;
            border-top: 4px solid #9333ea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .estrellas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .estrella {
            position: absolute;
            color: #e9d5ff;
            animation: caer linear infinite;
            filter: drop-shadow(0 0 4px #c084fc);
        }
        
        @keyframes caer {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
    <meta http-equiv="refresh" content="0;url=/misxv/inicio">
</head>
<body>
    <!-- Estrellas decorativas de fondo -->
    <div class="estrellas">
        <div class="estrella" style="left: 5%; animation-delay: 0s; animation-duration: 4s;">✦</div>
        <div class="estrella" style="left: 15%; animation-delay: 1s; animation-duration: 5s;">★</div>
        <div class="estrella" style="left: 25%; animation-delay: 2s; animation-duration: 4.5s;">✦</div>
        <div class="estrella" style="left: 35%; animation-delay: 0.5s; animation-duration: 5.5s;">★</div>
        <div class="estrella" style="left: 45%; animation-delay: 1.5s; animation-duration: 4s;">✦</div>
        <div class="estrella" style="left: 55%; animation-delay: 2.5s; animation-duration: 5s;">★</div>
        <div class="estrella" style="left: 65%; animation-delay: 0.8s; animation-duration: 4.8s;">✦</div>
        <div class="estrella" style="left: 75%; animation-delay: 1.8s; animation-duration: 5.2s;">★</div>
        <div class="estrella" style="left: 85%; animation-delay: 3s; animation-duration: 4.3s;">✦</div>
        <div class="estrella" style="left: 95%; animation-delay: 2.2s; animation-duration: 5.8s;">★</div>
    </div>
    
    <div class="loading">
        <h1>Mis XV</h1>
        <p class="nombre">Briana Natali</p>
        <p class="mensaje">Cargando invitación...</p>
        <div class="spinner"></div>
    </div>
    
    <script>
        // Redirección inmediata con JavaScript como respaldo
        window.location.href = "/misxv/inicio/";
    </script>
</body>
</html>
