<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contadores XV Años Gali</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f8f1f4;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #c67a97;
        }

        .login-container,
        .dashboard {
            max-width: 1200px;
            margin: auto;
        }

        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .login-box h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #c67a97;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #c67a97;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            opacity: .9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .card h3 {
            color: #777;
            margin-bottom: 10px;
        }

        .card .number {
            font-size: 42px;
            font-weight: bold;
            color: #c67a97;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f5d9e3;
            color: #444;
        }

        tr:hover {
            background: #fafafa;
        }

        .hidden {
            display: none;
        }

        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }

        @media(max-width:768px) {
            .card .number {
                font-size: 32px;
            }

            table {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2>Acceso Dashboard</h2>

            <input type="password" id="password" placeholder="Ingresa la contraseña">

            <button onclick="login()">
                Entrar
            </button>

            <button onclick="invita()" style="margin-top:1rem;">
                Ver Invitación
            </button>

            <div class="error" id="error"></div>
        </div>
    </div>

    <div class="dashboard hidden" id="dashboard">

        <button onclick="invita()" style="margin-top:2rem; margin-bottom:2rem;">
                Regresar a invitación
        </button>

        <h1>Contadores XV Años Gali</h1>

        <div class="cards">

            <div class="card">
                <h3>Confirmados</h3>
                <div class="number" id="confirmados">0</div>
            </div>

            <div class="card">
                <h3>No Confirmados</h3>
                <div class="number" id="noConfirmados">0</div>
            </div>

            <div class="card">
                <h3>Visitas</h3>
                <div class="number" id="visitas">0</div>
            </div>

        </div>

        <div class="table-container">
            <h2>Asistentes</h2>

            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Número de Personas</th>
                        <th>Fecha de Confirmación</th>
                        <th>Asiste</th>
                    </tr>
                </thead>

                <tbody id="tablaAsistentes">
                </tbody>
            </table>
        </div>

    </div>

    <script>

        // =========================================
        // FIREBASE CONFIG
        // =========================================

        const firebaseConfig = { apiKey: "AIzaSyC6Xrc9EqMyXKH_gNFaOGuAX-ItudzZAVs", authDomain: "bautizo-sofia.firebaseapp.com", databaseURL: "https://bautizo-sofia-default-rtdb.firebaseio.com", projectId: "bautizo-sofia", storageBucket: "bautizo-sofia.firebasestorage.app", messagingSenderId: "981839514602", appId: "1:981839514602:web:981d3b9a4dcde418c84093", measurementId: "G-TVQSGB0FWT" };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.database();

        // =========================================
        // LOGIN
        // =========================================

        function invita(){
            location.href = "https://siempreinvitados.github.io/misxv/gali/"
        }

        async function login() {

            const password = document.getElementById("password").value;

            const error = document.getElementById("error");

            error.innerText = "";

            try {

                const snapshot = await db.ref("contadoresGali/password").once("value");

                const firebasePassword = snapshot.val();

                if (password === firebasePassword) {

                    document.getElementById("loginContainer").classList.add("hidden");

                    document.getElementById("dashboard").classList.remove("hidden");

                    cargarDashboard();

                } else {

                    error.innerText = "Contraseña incorrecta";

                }

            } catch (e) {

                console.error(e);

                error.innerText = "Error al conectar con Firebase";

            }

        }

        // =========================================
        // DASHBOARD
        // =========================================

        async function cargarDashboard() {

            try {

                // =========================
                // CONTADORES
                // =========================

                const confirmadosSnap = await db.ref("contadoresGali/confirmados").once("value");
                const noConfirmadosSnap = await db.ref("contadoresGali/noConfirmados").once("value");
                const visitasSnap = await db.ref("contadoresGali/visitas").once("value");

                document.getElementById("confirmados").innerText = confirmadosSnap.val() || 0;

                document.getElementById("noConfirmados").innerText = noConfirmadosSnap.val() || 0;

                document.getElementById("visitas").innerText = visitasSnap.val() || 0;

                // =========================
                // ASISTENTES
                // =========================

                const asistentesSnap = await db.ref("contadoresGali/asistentes").once("value");

                const asistentes = asistentesSnap.val();

                const tabla = document.getElementById("tablaAsistentes");

                tabla.innerHTML = "";

                if (asistentes) {

                    Object.keys(asistentes).forEach(key => {

                        const item = asistentes[key];

                        const tr = document.createElement("tr");

                        tr.innerHTML = `
                        <td>${item.nombre || ""}</td>
                        <td>${item.personas || 0}</td>
                        <td>${item.date || ""}</td>
                        <td>${item.asiste ? "Sí" : "No"}</td>
                    `;

                        tabla.appendChild(tr);

                    });

                }

            } catch (e) {

                console.error(e);

                alert("Error cargando dashboard");

            }

        }

    </script>

</body>

</html>
